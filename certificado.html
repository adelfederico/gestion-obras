<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificado de Avance — GestionObras</title>
<style>
:root{--bg:#0f1923;--bg2:#162030;--bg3:#1d2d3f;--card:#1a2a3a;--border:#2a3f58;--accent:#f0a500;--text:#e8edf2;--text2:#8fa8c0;--text3:#4a6a88;--green:#2ecc71;--red:#e74c3c;--blue:#3498db;--radius:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;}
#topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.logo{font-size:20px;font-weight:800;color:var(--accent);}
.nav-links{display:flex;gap:16px;}
.nav-links a{color:var(--text2);font-size:13px;text-decoration:none;padding:6px 12px;border-radius:8px;border:1px solid var(--border);}
#main{max-width:900px;margin:0 auto;padding:24px;}
.config-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px;}
.config-title{font-size:15px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:20px;}
.fg{margin-bottom:16px;}
.fl{display:block;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:10px 13px;outline:none;font-family:inherit;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.btn{background:var(--accent);color:#000;font-weight:700;font-size:14px;padding:12px 28px;border-radius:10px;border:none;cursor:pointer;width:100%;}
.btn:hover{opacity:.9;}
#preview-wrap{display:none;}
/* ESTILOS DEL CERTIFICADO IMPRIMIBLE */
#certificado-preview{background:#fff;color:#000;padding:40px;border-radius:var(--radius);font-family:'Arial',sans-serif;margin-bottom:20px;}
.cert-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #1a3a5f;padding-bottom:20px;margin-bottom:24px;}
.cert-empresa{font-size:22px;font-weight:800;color:#1a3a5f;}
.cert-empresa-sub{font-size:12px;color:#666;margin-top:3px;}
.cert-titulo-doc{text-align:right;}
.cert-titulo-doc h1{font-size:20px;font-weight:800;color:#1a3a5f;text-transform:uppercase;}
.cert-titulo-doc .cert-num{font-size:14px;color:#666;margin-top:4px;}
.cert-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;background:#f5f7fa;border-radius:8px;padding:16px;margin-bottom:24px;}
.cert-info-item label{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px;}
.cert-info-item span{font-size:14px;font-weight:600;color:#222;}
.cert-section-title{font-size:12px;font-weight:700;color:#1a3a5f;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid #ddd;padding-bottom:6px;margin-bottom:12px;margin-top:20px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:#1a3a5f;color:#fff;padding:8px 10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
td{padding:7px 10px;border-bottom:1px solid #eee;}
tr:nth-child(even) td{background:#f9f9f9;}
.num{text-align:right;}
.barra-cert-wrap{background:#e0e0e0;border-radius:3px;height:8px;min-width:60px;}
.barra-cert{height:8px;border-radius:3px;background:#2ecc71;}
.cert-totales{background:#1a3a5f;color:#fff;border-radius:8px;padding:16px 20px;margin-top:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.cert-total-item label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.7;display:block;margin-bottom:4px;}
.cert-total-item span{font-size:18px;font-weight:800;}
.cert-firmas{display:grid;grid-template-columns:1fr 1fr 1fr;gap:30px;margin-top:50px;}
.firma-box{text-align:center;}
.firma-linea{border-top:1px solid #333;margin-bottom:8px;}
.firma-nombre{font-size:12px;font-weight:700;color:#333;}
.firma-cargo{font-size:10px;color:#666;}
.cert-pie{text-align:center;margin-top:24px;padding-top:16px;border-top:1px solid #ddd;font-size:10px;color:#999;}
@media print{
  body{background:#fff;}
  #topbar,#main>.config-card,#main>div:not(#preview-wrap){display:none!important;}
  #preview-wrap{display:block!important;}
  #btn-imprimir,#btn-pdf{display:none;}
  #certificado-preview{box-shadow:none;border-radius:0;padding:20px;}
}
</style>
</head>
<body>
<div id="topbar">
  <div class="logo">🏗️ OBRAS — Certificado</div>
  <div class="nav-links">
    <a href="index.html">📱 App</a>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="reportes.html">📈 Reportes</a>
  </div>
</div>
<div id="main">

  <div class="config-card">
    <div class="config-title">Configurar Certificado</div>
    <div class="r2">
      <div class="fg">
        <label class="fl">Obra *</label>
        <select id="sel-obra"><option value="">Seleccioná...</option></select>
      </div>
      <div class="fg">
        <label class="fl">Nº Certificado</label>
        <input type="text" id="cert-num" value="001" placeholder="001">
      </div>
    </div>
    <div class="r2">
      <div class="fg">
        <label class="fl">Empresa / Dirección de Obra</label>
        <input type="text" id="empresa" placeholder="Nombre de tu empresa o estudio">
      </div>
      <div class="fg">
        <label class="fl">Período</label>
        <input type="text" id="periodo" placeholder="Ej: Enero 2026">
      </div>
    </div>
    <div class="r2">
      <div class="fg">
        <label class="fl">Director de Obra</label>
        <input type="text" id="director" placeholder="Nombre y matrícula">
      </div>
      <div class="fg">
        <label class="fl">Representante Técnico</label>
        <input type="text" id="rep-tecnico" placeholder="Nombre y matrícula">
      </div>
    </div>
    <div class="fg">
      <label class="fl">Observaciones (opcional)</label>
      <textarea id="observaciones" rows="2" placeholder="Notas adicionales para el certificado..."></textarea>
    </div>
    <button class="btn" onclick="generarCertificado()">📄 Generar Certificado</button>
  </div>

  <div id="preview-wrap">
    <div style="display:flex;gap:12px;margin-bottom:16px">
      <button class="btn" id="btn-imprimir" onclick="window.print()" style="background:var(--blue);color:#fff">🖨️ Imprimir / PDF</button>
    </div>

    <div id="certificado-preview">
      <!-- Se genera dinámicamente -->
    </div>
  </div>

</div>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwpB1SaEG2oKKkAmOEdVk4pNmwFWEkINHdhW4EHuNTqtq-q-Lu9N9kAVc_lB7ckl5Sn/exec';

function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb='cb'+Math.random().toString(36).slice(2);
    window[cb]=function(d){delete window[cb];document.getElementById('_s'+cb)&&document.getElementById('_s'+cb).remove();resolve(d);};
    const s=document.createElement('script');s.id='_s'+cb;
    s.onerror=()=>reject(new Error('Sin conexión'));
    s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
    document.body.appendChild(s);
  });
}

function fmt(n){return new Intl.NumberFormat('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);}

async function init(){
  const obras = await jsonp(SCRIPT_URL+'?action=getObras');
  const sel = document.getElementById('sel-obra');
  obras.forEach(o=>{const op=document.createElement('option');op.value=o.id;op.textContent=o.nombre;sel.appendChild(op);});
  // Set default periodo
  const now = new Date();
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('periodo').value = meses[now.getMonth()]+' '+now.getFullYear();
}

async function generarCertificado(){
  const id = document.getElementById('sel-obra').value;
  if(!id) return alert('Seleccioná una obra');
  
  const btn = document.querySelector('.btn');
  btn.textContent = '⏳ Generando...';
  btn.disabled = true;

  try {
    const data = await jsonp(SCRIPT_URL+'?action=getReporteCertificado&id_obra='+id);
    if(!data || !data.totales) throw new Error('Sin datos para esta obra');
    
    const empresa = document.getElementById('empresa').value || 'Dirección de Obra';
    const certNum = document.getElementById('cert-num').value || '001';
    const periodo = document.getElementById('periodo').value;
    const director = document.getElementById('director').value || '____________________';
    const repTec = document.getElementById('rep-tecnico').value || '____________________';
    const obs = document.getElementById('observaciones').value;
    const hoy = new Date().toLocaleDateString('es-AR');
    const avancePct = data.totales.avance_global_pct;

    // Generar HTML del certificado
    const itemsHTML = data.items.map(it=>{
      const pct = Math.round(it.avance_acumulado*1000)/10;
      const barraW = Math.min(pct,100);
      return `<tr>
        <td>${it.codigo}</td>
        <td>${it.descripcion}</td>
        <td>${it.unidad}</td>
        <td class="num">$${fmt(it.total_presup_ars)}</td>
        <td class="num">${pct}%</td>
        <td><div class="barra-cert-wrap"><div class="barra-cert" style="width:${barraW}%"></div></div></td>
        <td class="num">$${fmt(it.monto_certificado)}</td>
      </tr>`;
    }).join('');

    document.getElementById('certificado-preview').innerHTML = `
      <div class="cert-header">
        <div>
          <div class="cert-empresa">${empresa}</div>
          <div class="cert-empresa-sub">Dirección y Supervisión de Obra</div>
        </div>
        <div class="cert-titulo-doc">
          <h1>Certificado de Avance</h1>
          <div class="cert-num">Nº ${certNum} — ${periodo}</div>
        </div>
      </div>

      <div class="cert-info-grid">
        <div class="cert-info-item"><label>Obra</label><span>${data.obra.nombre}</span></div>
        <div class="cert-info-item"><label>Comitente</label><span>${data.obra.comitente||'—'}</span></div>
        <div class="cert-info-item"><label>Dirección</label><span>${data.obra.direccion||'—'}</span></div>
        <div class="cert-info-item"><label>Fecha de emisión</label><span>${hoy}</span></div>
      </div>

      <div class="cert-section-title">Detalle de Avance por Ítem</div>
      <table>
        <thead><tr><th>Código</th><th>Descripción</th><th>Und.</th><th class="num">Presup. ARS</th><th class="num">Avance</th><th>Progreso</th><th class="num">Certificado ARS</th></tr></thead>
        <tbody>${itemsHTML}</tbody>
      </table>

      <div class="cert-totales">
        <div class="cert-total-item"><label>Presupuesto Total</label><span>$${fmt(data.totales.presup_ars)}</span></div>
        <div class="cert-total-item"><label>Avance Global</label><span>${avancePct}%</span></div>
        <div class="cert-total-item"><label>Monto Certificado</label><span>$${fmt(data.totales.certificado_ars)}</span></div>
      </div>

      ${obs?`<div style="margin-top:20px;background:#f5f7fa;border-radius:8px;padding:12px 16px"><strong style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#666">Observaciones:</strong><p style="font-size:13px;margin-top:6px;color:#333">${obs}</p></div>`:''}

      <div class="cert-firmas">
        <div class="firma-box"><div style="height:50px"></div><div class="firma-linea"></div><div class="firma-nombre">${director}</div><div class="firma-cargo">Director de Obra</div></div>
        <div class="firma-box"><div style="height:50px"></div><div class="firma-linea"></div><div class="firma-nombre">${repTec}</div><div class="firma-cargo">Representante Técnico</div></div>
        <div class="firma-box"><div style="height:50px"></div><div class="firma-linea"></div><div class="firma-nombre">${data.obra.comitente||'Comitente'}</div><div class="firma-cargo">Comitente</div></div>
      </div>

      <div class="cert-pie">Documento generado por Sistema GestionObras • ${hoy} • Certificado Nº ${certNum}</div>
    `;

    document.getElementById('preview-wrap').style.display='block';
    document.getElementById('preview-wrap').scrollIntoView({behavior:'smooth'});
  } catch(e) {
    alert('Error: '+e.message);
  } finally {
    btn.textContent = '📄 Generar Certificado';
    btn.disabled = false;
  }
}

init();
</script>
</body>
</html>
